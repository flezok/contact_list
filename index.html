<!DOCTYPE html>

<head>

    <title>Document</title>

    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />

<body>
    <header class="header">
        <h1 class="header__title">
            Contact List on JS
        </h1>
        <a class="gitHub-link" href="https://github.com/flezok/contact_list">
            GitHub Repository link
        </a>
    </header>

    <form class="form">

        <button class="form__btn form__btn-add">ADD</button>
        <button class="form__btn form__btn-clear">Clear List</button>
        <button class="form__btn form__btn-search">Search</button>
    </form>
