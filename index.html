<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <script src="./js/main.js" defer></script>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="header">
        <h1 class="header__title">
            Contact List on JS
        </h1>
        <a class="gitHub-link" href="https://github.com/flezok/contact_list">
            GitHub Repository link
        </a>
    </header>

    <div class="inputs">
        <input class="input input-name" type="text" placeholder="Name"/>
        <input class="input input-vacancy" type="text" placeholder="Vacancy"/>
        <input class="input input-phone" type="tel" placeholder="Phone +X XXX XXX XX XX"/>
        <button class="btn btn-add" type="submit">ADD</button>
        <button class="btn btn-clear" type="submit">Clear List</button>
        <button class="btn btn-search" type="submit">Search</button>
    </div>
